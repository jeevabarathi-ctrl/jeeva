<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPRCAS Student Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0b4f9c,#1f7ed6);
}

.login-container{
    width:400px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    text-align:center;
}

.logo{
    width:250px;
    max-width:100%;
    margin-bottom:20px;
}

h2{
    color:#0b4f9c;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:25px;
    font-size:14px;
}

.input-group{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#0b4f9c;
}

button{
    width:100%;
    padding:12px;
    background:#0b4f9c;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#083a74;
}

.footer{
    margin-top:20px;
    font-size:13px;
    color:#777;
}
</style>
</head>

<body>

<div class="login-container">

    <!-- Replace with your uploaded logo file -->
    <img src="kprcas.jpg" alt="KPRCAS Logo" class="logo">

    <h2>Student Login</h2>
    <p class="subtitle">
        KPR College of Arts Science and Research
    </p>

    <form>
        <div class="input-group">
            <input type="text" placeholder="Register Number" required>
        </div>

        <div class="input-group">
            <input type="password" placeholder="Password" required>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="footer">
        © 2025 KPRCAS | Learn Beyond
    </div>

</div>

</body>
</html>
