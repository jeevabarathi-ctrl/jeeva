<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f4f4f4;
    }

    .search-box {
      text-align: center;
    }

    input[type="text"] {
      width: 300px;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="search-box">
    <h2>Search</h2>

    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <input
        type="text"
        name="search_query"
        placeholder="Enter your search"
        required
      >
      <button type="submit">Search</button>
    </form>

    <p>This form submits the entered text to the configured form endpoint.</p>
  </div>
</body>
</html>
